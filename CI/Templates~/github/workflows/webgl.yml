# Copied from the T2FBuild package: CI/Templates~/github/workflows/webgl.yml
# Source: https://github.com/unittt/T2FBuild
#
# === Required GitHub Secrets ===
#   UNITY_LICENSE        GameCI .ulf file content (Personal license)
#   TENCENT_SECRET_ID    Tencent Cloud API SecretId (only if uploading)
#   TENCENT_SECRET_KEY   Tencent Cloud API SecretKey
#   COS_BUCKET           Bucket name (e.g. mybucket-1234567890)
#   COS_REGION           Bucket region (e.g. ap-shanghai)
#
# === Optional repo Variables (Settings > Secrets and variables > Actions > Variables) ===
#   BUILD_PROJECT        Project namespace for COS paths when a single bucket hosts
#                        multiple projects. Should match T2FBuildSettings.projectId.
#                        Leave unset for single-project buckets.
#
# === Required project setup ===
#   - T2FBuild package referenced in Packages/manifest.json (git URL).
#   - tools/upload-cos.py and tools/requirements.txt copied from this package
#     (CI/Templates~/tools/) into your project root. Commit them so CI can find them.
#
# === Triggers ===
#   - workflow_dispatch:  manual run; pick version / env / upload toggle.
#   - push tags v*:       full prod build with version derived from the tag,
#                         AB + Player auto-uploaded.
#
name: WebGL

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Build version (e.g. 1.0.0). Empty = derive from run number.'
        required: false
        type: string
      env:
        description: 'Build environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      upload:
        description: 'Upload to Tencent COS after build'
        required: true
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

concurrency:
  group: webgl-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build WebGL
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Compute build params
        id: params
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "env=prod"                          >> "$GITHUB_OUTPUT"
            echo "upload=true"                       >> "$GITHUB_OUTPUT"
          else
            VERSION="${{ inputs.version }}"
            [ -z "$VERSION" ] && VERSION="0.0.${{ github.run_number }}"
            echo "version=$VERSION"                     >> "$GITHUB_OUTPUT"
            echo "env=${{ inputs.env || 'dev' }}"       >> "$GITHUB_OUTPUT"
            echo "upload=${{ inputs.upload || 'false' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      - name: Build WebGL with Unity (T2FBuild)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          BUILD_VERSION: ${{ steps.params.outputs.version }}
          BUILD_NUMBER:  ${{ github.run_number }}
          BUILD_ENV:     ${{ steps.params.outputs.env }}
          # Upload runs in a separate CI step after Unity exits so the license is freed early.
          T2FBUILD_UPLOAD_ENABLED: 'false'
        with:
          targetPlatform: WebGL
          buildMethod: T2FBuild.Editor.BuildEntry.BuildWebGL
          allowDirtyBuild: true

      - name: Setup Python
        if: steps.params.outputs.upload == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tools/requirements.txt

      - name: Install COS uploader deps
        if: steps.params.outputs.upload == 'true'
        run: pip install -r tools/requirements.txt

      - name: Upload Asset Bundles to Tencent COS
        if: steps.params.outputs.upload == 'true' && hashFiles('Build/WebGL/upload-manifest.json') != ''
        run: python tools/upload-cos.py --manifest Build/WebGL/upload-manifest.json
        env:
          TENCENT_SECRET_ID:  ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          COS_BUCKET:         ${{ secrets.COS_BUCKET }}
          COS_REGION:         ${{ secrets.COS_REGION }}

      - name: Upload WebGL Player to Tencent COS
        if: steps.params.outputs.upload == 'true'
        env:
          TENCENT_SECRET_ID:  ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          COS_BUCKET:         ${{ secrets.COS_BUCKET }}
          COS_REGION:         ${{ secrets.COS_REGION }}
          BUILD_PROJECT:      ${{ vars.BUILD_PROJECT }}
        run: |
          python tools/upload-cos.py \
            --dir Build/WebGL/Player \
            --remote-prefix "${BUILD_PROJECT:+${BUILD_PROJECT}/}webgl/${{ steps.params.outputs.env }}/${{ steps.params.outputs.version }}/"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebGL-${{ steps.params.outputs.version }}
          path: Build/WebGL/Player/
          retention-days: 14

      - name: Job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## WebGL Build"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Version | \`${{ steps.params.outputs.version }}\` |"
            echo "| Env     | \`${{ steps.params.outputs.env }}\` |"
            echo "| Upload  | \`${{ steps.params.outputs.upload }}\` |"
            if [ "${{ steps.params.outputs.upload }}" = "true" ]; then
              PROJECT_SEGMENT=""
              [ -n "${{ vars.BUILD_PROJECT }}" ] && PROJECT_SEGMENT="${{ vars.BUILD_PROJECT }}/"
              echo "| WebGL URL | https://${{ secrets.COS_BUCKET }}.cos.${{ secrets.COS_REGION }}.myqcloud.com/${PROJECT_SEGMENT}webgl/${{ steps.params.outputs.env }}/${{ steps.params.outputs.version }}/index.html |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
