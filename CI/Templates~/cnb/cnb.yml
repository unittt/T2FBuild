# Copied from the T2FBuild package: CI/Templates~/cnb/cnb.yml
# Source: https://github.com/unittt/T2FBuild
#
# CNB pipeline file. CNB only reads a single .cnb.yml at the repository root,
# so this file declares ALL build workflows behind separate triggers.
#
# === Triggers ===
#
#   Manual (via the "Run" button in the CNB web UI):
#     - web_trigger_webgl:   build WebGL; provide VERSION / ENV / UPLOAD env vars
#     - web_trigger_wechat:  build WeChat MiniGame; same inputs
#
#   Tag-based (auto):
#     - tag v*    (e.g. v0.1.0)    => prod WebGL build + upload
#     - tag wx-v* (e.g. wx-v0.1.0) => prod WeChat MiniGame build + upload
#
# === Secrets setup (one-time, per project) ===
#
# CNB has no per-repo Secrets UI. The default below references envs.yml from
# THIS repo (Option B from docs/cnb-wechat-setup.md). For Option A (inline) or
# Option C (separate secrets repo), edit the imports: URL below.
#
# envs.yml is managed via Edit > Project Settings > T2FBuild > Secrets — that
# UI writes:
#   UNITY_LICENSE_BASE64    base64-encoded contents of Unity_v2022.x.ulf
#   TENCENT_SECRET_ID       Tencent Cloud API SecretId
#   TENCENT_SECRET_KEY      Tencent Cloud API SecretKey
#   COS_BUCKET              auto-copied from Tencent COS > Bucket
#   COS_REGION              auto-copied from Tencent COS > Region
#
# T2FBuild's native uploader (no Python/pip) reads these env vars directly when
# T2FBUILD_UPLOAD_ENABLED=true, so the Unity container handles AB + Player +
# WeChat first-package upload inline — no separate post-Unity steps needed.
#

# ---------- Shared anchors ----------
x-docker: &docker-unity-webgl
  image: unityci/editor:2022.3.14f1-webgl-3
  volumes:
    - /workspace/Library:copy-on-write
    - /workspace/Library_wechat:copy-on-write

x-imports: &imports
  - https://cnb.cool/REPLACE_ME_ORG/REPLACE_ME_REPO/-/blob/main/envs.yml

# ---------- Manual trigger: WebGL ----------
$:
  web_trigger_webgl:
    - name: build-webgl-manual
      runner:
        cpus: 8
      docker: *docker-unity-webgl
      imports: *imports
      env:
        T2FBUILD_UPLOAD_ENABLED: ${UPLOAD:-false}
        BUILD_VERSION: ${VERSION:-0.0.${CNB_BUILD_ID}}
        BUILD_NUMBER: ${CNB_BUILD_ID}
        BUILD_ENV: ${ENV:-dev}
        # Project namespace for COS paths when one bucket hosts multiple projects.
        # Must match T2FBuildSettings.projectId. Leave empty for single-project bucket.
        BUILD_PROJECT: ''
      stages:
        - name: activate-unity-license
          script: |
            set -e
            echo "$UNITY_LICENSE_BASE64" | base64 -d > /tmp/Unity.ulf
            unity-editor -batchmode -nographics -logFile - \
              -manualLicenseFile /tmp/Unity.ulf -quit || true
        - name: build-webgl
          # T2FBuild's native uploader runs inline when T2FBUILD_UPLOAD_ENABLED=true;
          # reads COS credentials from process env vars (set via imports: above).
          script: |
            set -e
            unity-editor -batchmode -nographics -logFile - \
              -projectPath "$PWD" \
              -buildTarget WebGL \
              -executeMethod T2FBuild.Editor.BuildEntry.BuildWebGL \
              -quit

# ---------- Manual trigger: WeChat MiniGame ----------
  web_trigger_wechat:
    - name: build-wechat-manual
      runner:
        cpus: 8
      docker: *docker-unity-webgl
      imports: *imports
      env:
        T2FBUILD_UPLOAD_ENABLED: ${UPLOAD:-false}
        BUILD_VERSION: ${VERSION:-0.0.${CNB_BUILD_ID}}
        BUILD_NUMBER: ${CNB_BUILD_ID}
        BUILD_ENV: ${ENV:-dev}
      stages:
        - name: install-node
          script: |
            set -e
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -y nodejs
            node --version
        - name: activate-unity-license
          script: |
            set -e
            echo "$UNITY_LICENSE_BASE64" | base64 -d > /tmp/Unity.ulf
            unity-editor -batchmode -nographics -logFile - \
              -manualLicenseFile /tmp/Unity.ulf -quit || true
        - name: build-wechat
          script: |
            set -e
            unity-editor -batchmode -nographics -logFile - \
              -projectPath "$PWD" \
              -buildTarget WebGL \
              -executeMethod T2FBuild.Editor.BuildEntry.BuildWeChat \
              -quit
        - name: pack-minigame-artifact
          script: |
            cd Build/WebGL_wechat
            tar czf minigame.tar.gz minigame/
            echo "Artifact: Build/WebGL_wechat/minigame.tar.gz"

# ---------- Tag-based: WebGL prod release ----------
"v*":
  tag_push:
    - name: build-webgl-release
      runner:
        cpus: 8
      docker: *docker-unity-webgl
      imports: *imports
      env:
        T2FBUILD_UPLOAD_ENABLED: 'true'
        BUILD_VERSION: ${CNB_BRANCH#v}
        BUILD_NUMBER: ${CNB_BUILD_ID}
        BUILD_ENV: prod
        BUILD_PROJECT: ''
      stages:
        - name: activate-unity-license
          script: |
            set -e
            echo "$UNITY_LICENSE_BASE64" | base64 -d > /tmp/Unity.ulf
            unity-editor -batchmode -nographics -logFile - \
              -manualLicenseFile /tmp/Unity.ulf -quit || true
        - name: build-webgl
          script: |
            set -e
            unity-editor -batchmode -nographics -logFile - \
              -projectPath "$PWD" \
              -buildTarget WebGL \
              -executeMethod T2FBuild.Editor.BuildEntry.BuildWebGL \
              -quit

# ---------- Tag-based: WeChat MiniGame prod release ----------
"wx-v*":
  tag_push:
    - name: build-wechat-release
      runner:
        cpus: 8
      docker: *docker-unity-webgl
      imports: *imports
      env:
        T2FBUILD_UPLOAD_ENABLED: 'true'
        BUILD_VERSION: ${CNB_BRANCH#wx-v}
        BUILD_NUMBER: ${CNB_BUILD_ID}
        BUILD_ENV: prod
      stages:
        - name: install-node
          script: |
            set -e
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -y nodejs
        - name: activate-unity-license
          script: |
            set -e
            echo "$UNITY_LICENSE_BASE64" | base64 -d > /tmp/Unity.ulf
            unity-editor -batchmode -nographics -logFile - \
              -manualLicenseFile /tmp/Unity.ulf -quit || true
        - name: build-wechat
          script: |
            set -e
            unity-editor -batchmode -nographics -logFile - \
              -projectPath "$PWD" \
              -buildTarget WebGL \
              -executeMethod T2FBuild.Editor.BuildEntry.BuildWeChat \
              -quit
        - name: pack-minigame-artifact
          script: |
            cd Build/WebGL_wechat
            tar czf minigame.tar.gz minigame/
            echo "Artifact: Build/WebGL_wechat/minigame.tar.gz"
            echo "Download and import into 微信开发者工具 (WeChat DevTools)."
